<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <!-- Welcome Card 3 — Villager + three action bubbles
       Single villager in the center (verified resident), three soft
       coloured bubbles arranged around them — each shows what they
       can do: top-left megaphone (report), top-right heart (support),
       bottom-right lightbulb (propose). Dotted lines connect villager
       to each bubble.
       Palette: warm cream + soft greens + terracotta + soft pink + soft
       gold — same family as the 8 feature illustrations. -->

  <!-- Ground shadow under villager -->
  <ellipse cx="140" cy="148" rx="32" ry="3.5" fill="#000" opacity="0.10"/>

  <!-- ✅ EDIT — Foliage at bottom-left (was vacant) -->
  <g>
    <!-- Small bush -->
    <circle cx="78" cy="138" r="9" fill="#4A6B3F"/>
    <circle cx="69" cy="141" r="6" fill="#5A7B4A"/>
    <circle cx="86" cy="141" r="6" fill="#5A7B4A"/>
    <circle cx="78" cy="132" r="5" fill="#658A55"/>
    <!-- A few grass blades to the left of bush -->
    <path d="M 56,152 Q 54,144 56,138" stroke="#4A6B3F" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M 60,152 Q 62,143 60,136" stroke="#4A6B3F" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M 64,152 Q 62,145 64,140" stroke="#5A7B4A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- Wildflowers -->
    <circle cx="100" cy="148" r="1.8" fill="#F5B940"/>
    <line x1="100" y1="150" x2="100" y2="156" stroke="#4A6B3F" stroke-width="0.8"/>
    <circle cx="108" cy="152" r="1.5" fill="#D9384E"/>
    <line x1="108" y1="154" x2="108" y2="158" stroke="#4A6B3F" stroke-width="0.7"/>
  </g>

  <!-- ✅ EDIT — Small balancing plant on bottom-right (between figure and lightbulb bubble) -->
  <g>
    <!-- Small tuft of grass -->
    <path d="M 175,154 Q 173,147 175,142" stroke="#4A6B3F" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M 179,154 Q 181,145 179,139" stroke="#4A6B3F" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M 183,154 Q 181,148 183,144" stroke="#5A7B4A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- A wildflower -->
    <circle cx="190" cy="148" r="1.8" fill="#F5B940"/>
    <line x1="190" y1="150" x2="190" y2="156" stroke="#4A6B3F" stroke-width="0.8"/>
  </g>

  <!-- ═════ Dotted green connector lines (drawn first, behind everything) ═════ -->
  <g stroke="#9BC18A" stroke-width="1.2" fill="none" stroke-dasharray="2.5,3.5" opacity="0.75">
    <!-- Villager → top-left megaphone bubble -->
    <path d="M 122,68 Q 95,60 75,52"/>
    <!-- Villager → top-right heart bubble -->
    <path d="M 158,68 Q 185,60 205,52"/>
    <!-- Villager → bottom-right lightbulb bubble -->
    <path d="M 158,110 Q 188,118 215,123"/>
  </g>

  <!-- ═════ CENTER: The verified villager ═════ -->
  <g>
    <!-- Legs -->
    <rect x="131" y="118" width="7" height="26" fill="#3F5470" rx="1.5"/>
    <rect x="142" y="118" width="7" height="26" fill="#3F5470" rx="1.5"/>
    <!-- Torso (warm terracotta shirt) -->
    <rect x="125" y="88" width="30" height="34" fill="#C2440A" rx="4"/>
    <!-- ✅ EDIT — Verified badge: bigger and centered on chest (was r=4 at 148,96) -->
    <circle cx="140" cy="105" r="7" fill="#FCE9D4" stroke="#4A6B3F" stroke-width="1.2"/>
    <path d="M 136.5,105 l 2.5,2.5 l 5,-5" stroke="#4A6B3F" stroke-width="1.6"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Head -->
    <circle cx="140" cy="76" r="11" fill="#E6B79E"/>
    <!-- Hair -->
    <path d="M 130,73 Q 140,63 150,73 Q 148,67 140,66 Q 132,67 130,73 Z" fill="#3A2A1A"/>
    <!-- Eyes -->
    <circle cx="136" cy="76" r="0.9" fill="#3A2A1A"/>
    <circle cx="144" cy="76" r="0.9" fill="#3A2A1A"/>
    <!-- Eyebrows -->
    <path d="M 134,72 Q 136,71 138,72" stroke="#3A2A1A" stroke-width="0.7" fill="none"/>
    <path d="M 142,72 Q 144,71 146,72" stroke="#3A2A1A" stroke-width="0.7" fill="none"/>
    <!-- Friendly smile -->
    <path d="M 135,81 Q 140,84 145,81" stroke="#3A2A1A" stroke-width="0.9"
          fill="none" stroke-linecap="round"/>
    <!-- Both arms slightly outward (welcoming posture) -->
    <path d="M 124,96 Q 116,108 119,118" stroke="#E6B79E" stroke-width="6"
          fill="none" stroke-linecap="round"/>
    <path d="M 156,96 Q 164,108 161,118" stroke="#E6B79E" stroke-width="6"
          fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="134" cy="147" rx="4.5" ry="2" fill="#3A2A1A"/>
    <ellipse cx="146" cy="147" rx="4.5" ry="2" fill="#3A2A1A"/>
  </g>

  <!-- ═════ TOP-LEFT BUBBLE: Megaphone (Report) ═════ -->
  <g>
    <circle cx="50" cy="46" r="26" fill="#F5E2D2"/>
    <circle cx="50" cy="46" r="26" fill="none" stroke="#E6B79E" stroke-width="1.2"/>
    <!-- Megaphone shape -->
    <path d="M 38,42 L 38,56 L 50,56 L 60,62 L 60,36 L 50,42 Z" fill="#C2440A"/>
    <!-- Megaphone handle/grip -->
    <rect x="36" y="48" width="3" height="6" fill="#7A5230"/>
    <!-- Sound waves -->
    <path d="M 64,46 Q 68,49 64,52" stroke="#C2440A" stroke-width="1.4"
          fill="none" stroke-linecap="round"/>
    <path d="M 67,42 Q 73,49 67,56" stroke="#C2440A" stroke-width="1.4"
          fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- ═════ TOP-RIGHT BUBBLE: Heart (Support) ═════ -->
  <g>
    <circle cx="230" cy="46" r="26" fill="#FCE0E4"/>
    <circle cx="230" cy="46" r="26" fill="none" stroke="#E6A0AC" stroke-width="1.2"/>
    <!-- Heart -->
    <path d="M 230,58
             C 215,46 215,34 224,32
             C 228,31 230,34 230,38
             C 230,34 232,31 236,32
             C 245,34 245,46 230,58 Z"
          fill="#D9384E"/>
    <!-- Highlight on heart -->
    <ellipse cx="225" cy="40" rx="2.5" ry="3" fill="#FFFFFF" opacity="0.35"/>
  </g>

  <!-- ═════ BOTTOM-RIGHT BUBBLE: Lightbulb (Propose) ═════ -->
  <g>
    <circle cx="230" cy="125" r="26" fill="#FFF3D6"/>
    <circle cx="230" cy="125" r="26" fill="none" stroke="#E6CD7E" stroke-width="1.2"/>
    <!-- Bulb glass -->
    <path d="M 222,117 Q 222,107 230,107 Q 238,107 238,117 Q 238,123 235,127 L 235,132 L 225,132 L 225,127 Q 222,123 222,117 Z"
          fill="#F5B940"/>
    <!-- Filament hint -->
    <path d="M 227,116 Q 230,114 233,116" stroke="#C2440A" stroke-width="0.6"
          fill="none" stroke-linecap="round"/>
    <!-- Highlight on bulb -->
    <ellipse cx="226" cy="113" rx="2" ry="3" fill="#FFFFFF" opacity="0.45"/>
    <!-- Bulb base (metal screw threads) -->
    <rect x="225" y="133" width="10" height="2.5" fill="#7A5230" rx="0.4"/>
    <rect x="226" y="136" width="8" height="2" fill="#7A5230" rx="0.3"/>
    <rect x="227" y="139" width="6" height="1.5" fill="#3A2A1A" rx="0.3"/>
    <!-- Light rays around bulb -->
    <g stroke="#F5B940" stroke-width="1.3" stroke-linecap="round" fill="none">
      <line x1="213" y1="104" x2="217" y2="108"/>
      <line x1="247" y1="104" x2="243" y2="108"/>
      <line x1="208" y1="117" x2="213" y2="117"/>
      <line x1="252" y1="117" x2="247" y2="117"/>
      <line x1="230" y1="100" x2="230" y2="104"/>
    </g>
  </g>

  <!-- Faint ground line -->
  <line x1="100" y1="155" x2="180" y2="155" stroke="#D7BC8C" stroke-width="0.5" opacity="0.6"/>
</svg>
