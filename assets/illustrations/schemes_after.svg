<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <!-- Scene 4 AFTER — Schemes: pension scheme applied
       Cross-fades from schemes.svg. Same volunteer in centre with the
       4 villagers around them, same sun, same ground. What changed:
         - The "वृद्धा पेंशन योजना" paper now has a big green ✓ stamp on it
         - Each of the 4 villagers has a small green ✓ above their head
         - Faces slightly happier (subtle smile change)
       Reads instantly as: "everyone applied successfully" -->

  <!-- Sun (upper-right) -->
  <circle cx="232" cy="28" r="14" fill="#F5B940" opacity="0.18"/>
  <circle cx="232" cy="28" r="9" fill="#F5B940"/>
  <g stroke="#F5B940" stroke-width="1.1" stroke-linecap="round" fill="none">
    <line x1="232" y1="12" x2="232" y2="16"/>
    <line x1="216" y1="28" x2="220" y2="28"/>
    <line x1="244" y1="28" x2="248" y2="28"/>
  </g>

  <!-- Ground -->
  <path d="M 0,136 L 280,136 L 280,170 L 0,170 Z" fill="#9BC18A"/>

  <!-- ═════ FIGURE 1 (leftmost): Farmer with hoe ═════ -->
  <g>
    <!-- Green ✓ above head -->
    <circle cx="34" cy="52" r="6" fill="#4A6B3F"/>
    <path d="M 30.5,52 l 2,2 l 4,-4" stroke="#FFFFFF" stroke-width="1.4"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Legs -->
    <rect x="28" y="106" width="5" height="30" fill="#3F5470" rx="1.5"/>
    <rect x="35" y="106" width="5" height="30" fill="#3F5470" rx="1.5"/>
    <!-- Torso -->
    <rect x="25" y="80" width="18" height="28" fill="#C2440A" rx="3"/>
    <!-- Head -->
    <circle cx="34" cy="72" r="8" fill="#E6B79E"/>
    <path d="M 26,69 Q 34,61 42,69 Q 40,65 34,64 Q 28,65 26,69 Z" fill="#3A2A1A"/>
    <circle cx="31" cy="72" r="0.7" fill="#3A2A1A"/>
    <circle cx="37" cy="72" r="0.7" fill="#3A2A1A"/>
    <path d="M 30,76 Q 34,79 38,76" stroke="#3A2A1A" stroke-width="0.8"
          fill="none" stroke-linecap="round"/>
    <!-- Right arm holding hoe -->
    <path d="M 43,86 Q 50,94 53,104" stroke="#E6B79E" stroke-width="4.5"
          fill="none" stroke-linecap="round"/>
    <!-- Hoe (handle + blade) -->
    <rect x="51" y="88" width="2" height="34" fill="#7A5230" rx="0.4"
          transform="rotate(18 51 88)"/>
    <path d="M 53,86 q -2,-5 2,-7 q 3,2 0,7 z" fill="#4A6B3F"/>
    <!-- Left arm down at side -->
    <path d="M 25,86 Q 19,98 21,108" stroke="#E6B79E" stroke-width="4.5"
          fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="30" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
    <ellipse cx="38" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
  </g>

  <!-- ═════ FIGURE 2 (left-center): Student with book ═════ -->
  <g>
    <!-- Green ✓ above head -->
    <circle cx="80" cy="58" r="6" fill="#4A6B3F"/>
    <path d="M 76.5,58 l 2,2 l 4,-4" stroke="#FFFFFF" stroke-width="1.4"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Legs -->
    <rect x="74" y="110" width="5" height="26" fill="#3F5470" rx="1.5"/>
    <rect x="81" y="110" width="5" height="26" fill="#3F5470" rx="1.5"/>
    <!-- Torso -->
    <rect x="71" y="86" width="18" height="26" fill="#D9A55D" rx="3"/>
    <!-- Head -->
    <circle cx="80" cy="78" r="8" fill="#D6A07A"/>
    <path d="M 72,75 Q 80,67 88,75 L 88,80 Q 80,74 72,80 Z" fill="#3A2A1A"/>
    <circle cx="77" cy="78" r="0.7" fill="#3A2A1A"/>
    <circle cx="83" cy="78" r="0.7" fill="#3A2A1A"/>
    <path d="M 76,82 Q 80,85 84,82" stroke="#3A2A1A" stroke-width="0.8"
          fill="none" stroke-linecap="round"/>
    <circle cx="80" cy="72" r="0.8" fill="#C2440A"/>
    <!-- Open book held in front, slightly tilted -->
    <g transform="rotate(-8 80 100)">
      <rect x="68" y="92" width="24" height="16" fill="#FCE9D4"
            stroke="#7A5230" stroke-width="0.7"/>
      <line x1="80" y1="92" x2="80" y2="108" stroke="#7A5230" stroke-width="0.5"/>
      <line x1="70" y1="96" x2="78" y2="96" stroke="#A0816A" stroke-width="0.4"/>
      <line x1="70" y1="100" x2="78" y2="100" stroke="#A0816A" stroke-width="0.4"/>
      <line x1="70" y1="104" x2="77" y2="104" stroke="#A0816A" stroke-width="0.4"/>
      <line x1="82" y1="96" x2="90" y2="96" stroke="#A0816A" stroke-width="0.4"/>
      <line x1="82" y1="100" x2="90" y2="100" stroke="#A0816A" stroke-width="0.4"/>
      <line x1="82" y1="104" x2="89" y2="104" stroke="#A0816A" stroke-width="0.4"/>
    </g>
    <!-- Feet -->
    <ellipse cx="76" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
    <ellipse cx="84" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
  </g>

  <!-- ═════ FIGURE 3 (CENTER): Volunteer holding scheme paper with ✓ ═════ -->
  <g>
    <!-- Legs -->
    <rect x="132" y="116" width="6" height="20" fill="#3F5470" rx="1.5"/>
    <rect x="142" y="116" width="6" height="20" fill="#3F5470" rx="1.5"/>
    <!-- Torso -->
    <rect x="126" y="82" width="28" height="36" fill="#9BC18A" rx="4"/>
    <!-- Head -->
    <circle cx="140" cy="72" r="10" fill="#E6B79E"/>
    <path d="M 130,69 Q 140,59 150,69 Q 148,64 140,63 Q 132,64 130,69 Z"
          fill="#3A2A1A"/>
    <circle cx="137" cy="72" r="0.8" fill="#3A2A1A"/>
    <circle cx="143" cy="72" r="0.8" fill="#3A2A1A"/>
    <path d="M 136,76 Q 140,80 144,76" stroke="#3A2A1A" stroke-width="0.9"
          fill="none" stroke-linecap="round"/>

    <!-- The scheme paper held in front of torso -->
    <rect x="116" y="92" width="48" height="32" fill="#FCE9D4"
          stroke="#7A5230" stroke-width="1" rx="1.5"/>
    <text x="140" y="103.5" text-anchor="middle" font-size="6.5"
          fill="#1F2937" font-weight="700"
          font-family="serif">वृद्धा पेंशन</text>
    <text x="140" y="112" text-anchor="middle" font-size="6.5"
          fill="#1F2937" font-weight="700"
          font-family="serif">योजना</text>

    <!-- Big green ✓ STAMP on the paper (the main "after" change) -->
    <circle cx="152" cy="118" r="10" fill="#4A6B3F" opacity="0.95"/>
    <path d="M 146,118 l 3,3 l 7,-7" stroke="#FFFFFF" stroke-width="2.6"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Arms holding paper -->
    <path d="M 115,94 Q 106,100 102,108" stroke="#E6B79E" stroke-width="5"
          fill="none" stroke-linecap="round"/>
    <path d="M 165,94 Q 174,100 178,108" stroke="#E6B79E" stroke-width="5"
          fill="none" stroke-linecap="round"/>

    <!-- Feet -->
    <ellipse cx="135" cy="138" rx="4" ry="1.8" fill="#3A2A1A"/>
    <ellipse cx="145" cy="138" rx="4" ry="1.8" fill="#3A2A1A"/>
  </g>

  <!-- ═════ FIGURE 4 (right-center): Woman with bindi ═════ -->
  <g>
    <!-- Green ✓ above head -->
    <circle cx="200" cy="58" r="6" fill="#4A6B3F"/>
    <path d="M 196.5,58 l 2,2 l 4,-4" stroke="#FFFFFF" stroke-width="1.4"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Legs -->
    <rect x="194" y="110" width="5" height="26" fill="#3F5470" rx="1.5"/>
    <rect x="201" y="110" width="5" height="26" fill="#3F5470" rx="1.5"/>
    <!-- Torso -->
    <rect x="191" y="86" width="18" height="28" fill="#3F5470" rx="3"/>
    <rect x="191" y="110" width="18" height="4" fill="#C2440A" rx="1"/>
    <!-- Head -->
    <circle cx="200" cy="78" r="8" fill="#D6A07A"/>
    <path d="M 192,75 Q 200,67 208,75 L 208,80 Q 200,74 192,80 Z" fill="#3A2A1A"/>
    <circle cx="197" cy="78" r="0.7" fill="#3A2A1A"/>
    <circle cx="203" cy="78" r="0.7" fill="#3A2A1A"/>
    <path d="M 196,82 Q 200,85 204,82" stroke="#3A2A1A" stroke-width="0.8"
          fill="none" stroke-linecap="round"/>
    <!-- Bindi -->
    <circle cx="200" cy="72" r="0.9" fill="#C2440A"/>
    <!-- Arms relaxed at sides -->
    <path d="M 191,92 Q 184,102 186,110" stroke="#D6A07A" stroke-width="4.5"
          fill="none" stroke-linecap="round"/>
    <path d="M 209,92 Q 216,102 214,110" stroke="#D6A07A" stroke-width="4.5"
          fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="196" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
    <ellipse cx="204" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
  </g>

  <!-- ═════ FIGURE 5 (rightmost): Elder with stick ═════ -->
  <g>
    <!-- Green ✓ above head -->
    <circle cx="248" cy="52" r="6" fill="#4A6B3F"/>
    <path d="M 244.5,52 l 2,2 l 4,-4" stroke="#FFFFFF" stroke-width="1.4"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Legs -->
    <rect x="242" y="106" width="5" height="30" fill="#7A5230" rx="1.5"/>
    <rect x="249" y="106" width="5" height="30" fill="#7A5230" rx="1.5"/>
    <!-- Torso -->
    <rect x="239" y="80" width="18" height="28" fill="#5A7B4A" rx="3"/>
    <!-- Head -->
    <circle cx="248" cy="72" r="8" fill="#D6A07A"/>
    <!-- Grey hair (elder) -->
    <path d="M 240,69 Q 248,61 256,69 Q 254,65 248,64 Q 242,65 240,69 Z"
          fill="#7A6A5A"/>
    <circle cx="245" cy="72" r="0.7" fill="#3A2A1A"/>
    <circle cx="251" cy="72" r="0.7" fill="#3A2A1A"/>
    <path d="M 244,76 Q 248,79 252,76" stroke="#3A2A1A" stroke-width="0.8"
          fill="none" stroke-linecap="round"/>
    <!-- Right arm holding walking stick -->
    <path d="M 257,86 Q 264,94 264,104" stroke="#D6A07A" stroke-width="4.5"
          fill="none" stroke-linecap="round"/>
    <rect x="262" y="98" width="2.5" height="38" fill="#7A5230" rx="0.5"/>
    <!-- Left arm relaxed -->
    <path d="M 239,86 Q 234,96 236,106" stroke="#D6A07A" stroke-width="4.5"
          fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="244" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
    <ellipse cx="252" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
  </g>

  <!-- A few wildflowers at ground level for warmth -->
  <g>
    <circle cx="62" cy="148" r="1.6" fill="#F5B940"/>
    <line x1="62" y1="150" x2="62" y2="155" stroke="#4A6B3F" stroke-width="0.7"/>
    <circle cx="172" cy="148" r="1.6" fill="#D9384E"/>
    <line x1="172" y1="150" x2="172" y2="155" stroke="#4A6B3F" stroke-width="0.7"/>
    <circle cx="222" cy="148" r="1.6" fill="#F5B940"/>
    <line x1="222" y1="150" x2="222" y2="155" stroke="#4A6B3F" stroke-width="0.7"/>
  </g>
</svg>
