<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <!-- Scene 3 AFTER — Crop Prices: live data arrived
       Cross-fades from crop_prices.svg. Same farmer's house on the left,
       same mill on the right, same dashed data line in between. What
       changed:
         - Phone screen brighter, with a soft cream glow ring
         - Each of the 3 price rows now has a small green check
         - Title bar says "अभी अपडेट" (just updated) in green
         - The dashed line now carries 3 rupee tokens (more data flowing)
         - The farmer's mouth becomes a clear smile -->

  <!-- Sun (upper-right) -->
  <circle cx="232" cy="28" r="14" fill="#F5B940" opacity="0.18"/>
  <circle cx="232" cy="28" r="9" fill="#F5B940"/>
  <g stroke="#F5B940" stroke-width="1.1" stroke-linecap="round" fill="none">
    <line x1="232" y1="12" x2="232" y2="16"/>
    <line x1="216" y1="28" x2="220" y2="28"/>
    <line x1="244" y1="28" x2="248" y2="28"/>
  </g>

  <!-- Ground -->
  <path d="M 0,136 L 280,136 L 280,170 L 0,170 Z" fill="#9BC18A"/>

  <!-- Farmer's house (left) -->
  <g>
    <rect x="22" y="76" width="56" height="60" fill="#E6C9A8"/>
    <polygon points="18,76 50,52 82,76" fill="#A23808"/>
    <rect x="42" y="106" width="12" height="30" fill="#7A5230"/>
    <circle cx="51" cy="120" r="0.7" fill="#F5B940"/>
    <!-- Window with shutters -->
    <rect x="28" y="88" width="10" height="10" fill="#FCE9D4" stroke="#7A5230" stroke-width="0.6"/>
    <line x1="33" y1="88" x2="33" y2="98" stroke="#7A5230" stroke-width="0.5"/>
    <line x1="28" y1="93" x2="38" y2="93" stroke="#7A5230" stroke-width="0.5"/>
    <rect x="60" y="88" width="10" height="10" fill="#FCE9D4" stroke="#7A5230" stroke-width="0.6"/>
    <line x1="65" y1="88" x2="65" y2="98" stroke="#7A5230" stroke-width="0.5"/>
    <line x1="60" y1="93" x2="70" y2="93" stroke="#7A5230" stroke-width="0.5"/>
  </g>

  <!-- Farmer + phone (in front of house) -->
  <g>
    <!-- Legs -->
    <rect x="90" y="108" width="6" height="28" fill="#3F5470" rx="1.5"/>
    <rect x="98" y="108" width="6" height="28" fill="#3F5470" rx="1.5"/>
    <!-- Torso -->
    <rect x="86" y="82" width="22" height="28" fill="#C2440A" rx="3"/>
    <!-- Head -->
    <circle cx="97" cy="72" r="9" fill="#E6B79E"/>
    <path d="M 88,69 Q 97,60 106,69 Q 104,64 97,63 Q 90,64 88,69 Z" fill="#3A2A1A"/>
    <!-- Eyes -->
    <circle cx="94" cy="72" r="0.7" fill="#3A2A1A"/>
    <circle cx="100" cy="72" r="0.7" fill="#3A2A1A"/>
    <!-- BIG smile (was a gentle line in BEFORE) -->
    <path d="M 93,76 Q 97,80 101,76" stroke="#3A2A1A" stroke-width="0.9"
          fill="none" stroke-linecap="round"/>

    <!-- Phone held in BOTH hands at chest, slightly raised -->
    <!-- Arms reaching forward to phone -->
    <path d="M 86,88 Q 76,98 80,108" stroke="#E6B79E" stroke-width="5"
          fill="none" stroke-linecap="round"/>
    <path d="M 108,88 Q 118,98 114,108" stroke="#E6B79E" stroke-width="5"
          fill="none" stroke-linecap="round"/>

    <!-- Phone with bright glow ring (data just arrived) -->
    <circle cx="98" cy="104" r="22" fill="#F5B940" opacity="0.12"/>
    <circle cx="98" cy="104" r="16" fill="#F5B940" opacity="0.18"/>

    <rect x="86" y="92" width="24" height="36" fill="#1A1A1A" rx="3"/>
    <rect x="88" y="94" width="20" height="32" fill="#FFFFFF" rx="1.5"/>

    <!-- Title bar (green = freshly updated) -->
    <rect x="88" y="94" width="20" height="5" fill="#1A8870"/>
    <text x="98" y="98.4" text-anchor="middle" font-size="3.4"
          fill="#FFFFFF" font-weight="700">अभी अपडेट</text>

    <!-- Row 1 -->
    <rect x="89" y="100.5" width="18" height="7" fill="#FCE9D4"
          stroke="#9BC18A" stroke-width="0.4"/>
    <text x="91" y="106" font-size="4" fill="#1F2937" font-weight="600">गेहूँ</text>
    <text x="100" y="106" font-size="4" fill="#C2440A" font-weight="700">₹22</text>
    <circle cx="105" cy="104.5" r="1.4" fill="#4A6B3F"/>
    <path d="M 104.2,104.5 l 0.6,0.6 l 1.2,-1.2" stroke="#FFFFFF"
          stroke-width="0.7" fill="none" stroke-linecap="round"/>

    <!-- Row 2 -->
    <rect x="89" y="108.5" width="18" height="7" fill="#FCE9D4"
          stroke="#9BC18A" stroke-width="0.4"/>
    <text x="91" y="114" font-size="4" fill="#1F2937" font-weight="600">चावल</text>
    <text x="100" y="114" font-size="4" fill="#C2440A" font-weight="700">₹18</text>
    <circle cx="105" cy="112.5" r="1.4" fill="#4A6B3F"/>
    <path d="M 104.2,112.5 l 0.6,0.6 l 1.2,-1.2" stroke="#FFFFFF"
          stroke-width="0.7" fill="none" stroke-linecap="round"/>

    <!-- Row 3 -->
    <rect x="89" y="116.5" width="18" height="7" fill="#FCE9D4"
          stroke="#9BC18A" stroke-width="0.4"/>
    <text x="91" y="122" font-size="4" fill="#1F2937" font-weight="600">सरसों</text>
    <text x="100" y="122" font-size="4" fill="#C2440A" font-weight="700">₹30</text>
    <circle cx="105" cy="120.5" r="1.4" fill="#4A6B3F"/>
    <path d="M 104.2,120.5 l 0.6,0.6 l 1.2,-1.2" stroke="#FFFFFF"
          stroke-width="0.7" fill="none" stroke-linecap="round"/>

    <!-- Feet -->
    <ellipse cx="93" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
    <ellipse cx="101" cy="138" rx="3.5" ry="1.6" fill="#3A2A1A"/>
  </g>

  <!-- Dashed connector line — now carries 3 ₹ tokens (more data) -->
  <g stroke="#1A8870" stroke-width="1.4" fill="none"
     stroke-dasharray="3,4" opacity="0.85">
    <path d="M 124,108 Q 158,96 196,102"/>
  </g>
  <g>
    <!-- Rupee token 1 (closest to phone) -->
    <circle cx="142" cy="102" r="4.5" fill="#F5B940"/>
    <text x="142" y="105" text-anchor="middle" font-size="5.5"
          fill="#7A5230" font-weight="700">₹</text>
    <!-- Rupee token 2 (middle) -->
    <circle cx="162" cy="97" r="3.5" fill="#F5B940" opacity="0.9"/>
    <text x="162" y="99.4" text-anchor="middle" font-size="4.5"
          fill="#7A5230" font-weight="700">₹</text>
    <!-- Rupee token 3 (closest to mill) -->
    <circle cx="182" cy="102" r="3.5" fill="#F5B940" opacity="0.9"/>
    <text x="182" y="104.4" text-anchor="middle" font-size="4.5"
          fill="#7A5230" font-weight="700">₹</text>
  </g>

  <!-- Mill / vendor (right) -->
  <g>
    <rect x="196" y="78" width="56" height="58" fill="#E6C9A8"/>
    <rect x="196" y="68" width="56" height="12" fill="#A23808"/>
    <!-- Chimney with smoke -->
    <rect x="214" y="44" width="10" height="26" fill="#7A5230"/>
    <path d="M 218,42 Q 214,32 218,22 Q 222,32 218,42" fill="#A0816A" opacity="0.7"/>
    <path d="M 222,38 Q 218,28 222,18 Q 226,28 222,38" fill="#A0816A" opacity="0.55"/>
    <!-- Door -->
    <rect x="214" y="108" width="14" height="28" fill="#7A5230"/>
    <rect x="210" y="106" width="22" height="3" fill="#5A3B22"/>
    <rect x="220" y="118" width="2" height="4" fill="#F5B940"/>
    <!-- Sign on the building -->
    <rect x="232" y="92" width="14" height="10" fill="#FCE9D4"
          stroke="#7A5230" stroke-width="0.6"/>
    <text x="239" y="99.5" text-anchor="middle" font-size="4.5"
          fill="#1F2937" font-weight="700">₹</text>
  </g>

  <!-- A small wildflower at ground level for warmth -->
  <g>
    <circle cx="58" cy="148" r="1.6" fill="#F5B940"/>
    <line x1="58" y1="150" x2="58" y2="155" stroke="#4A6B3F" stroke-width="0.7"/>
    <circle cx="160" cy="148" r="1.6" fill="#D9384E"/>
    <line x1="160" y1="150" x2="160" y2="155" stroke="#4A6B3F" stroke-width="0.7"/>
    <circle cx="220" cy="148" r="1.6" fill="#F5B940"/>
    <line x1="220" y1="150" x2="220" y2="155" stroke="#4A6B3F" stroke-width="0.7"/>
  </g>
</svg>
