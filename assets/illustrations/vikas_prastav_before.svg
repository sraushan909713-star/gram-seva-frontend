<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <!-- Scene 2 BEFORE — Unused community hall, villager looking quietly
       Cross-fades to vikas_prastav_after.svg in the cinematic. Neglected
       but not gloomy — muted greys/browns instead of the warm cream that
       the AFTER uses. Two locked wooden doors. Closed dusty windows. Weeds
       growing at the base. A faded sign reading "सामुदायिक भवन". Villager
       outside, arms crossed, looking up at the building — no thought
       bubble (that's the whole point: no pre-imagined solution). -->

  <!-- Sun (upper-right, slightly dimmer than other scenes) -->
  <circle cx="234" cy="26" r="13" fill="#F5B940" opacity="0.16"/>
  <circle cx="234" cy="26" r="8" fill="#F5B940"/>
  <g stroke="#F5B940" stroke-width="1.1" stroke-linecap="round" fill="none">
    <line x1="234" y1="10" x2="234" y2="14"/>
    <line x1="218" y1="26" x2="222" y2="26"/>
    <line x1="246" y1="26" x2="250" y2="26"/>
  </g>

  <!-- Ground — duller olive-green to suggest neglect -->
  <path d="M 0,134 L 280,134 L 280,170 L 0,170 Z" fill="#A8B89A"/>

  <!-- The closed bhawan -->
  <g>
    <!-- Walls — muted dusty grey/cream (was warm cream in AFTER) -->
    <rect x="118" y="48" width="148" height="86" fill="#C4B59A" rx="2"/>
    <!-- Roof — faded brown -->
    <polygon points="112,48 192,18 272,48" fill="#8A4B22" opacity="0.85"/>
    <rect x="190" y="22" width="4" height="10" fill="#7A5230"/>

    <!-- Weathered streaks on walls (subtle vertical staining) -->
    <rect x="116" y="46" width="5" height="88" fill="#A89882" opacity="0.5"/>
    <rect x="264" y="46" width="5" height="88" fill="#A89882" opacity="0.5"/>

    <!-- Faded sign — text dim, edges worn -->
    <rect x="148" y="34" width="92" height="13" fill="#8A6248" rx="1"/>
    <rect x="148" y="34" width="92" height="13" fill="none"
          stroke="#3A2A1A" stroke-width="0.5"/>
    <text x="194" y="44" text-anchor="middle" font-size="8.5"
          font-weight="700" fill="#F5E2D2"
          font-family="serif" opacity="0.85">सामुदायिक भवन</text>

    <!-- LEFT window — closed shutters with grime -->
    <rect x="128" y="68" width="34" height="32" fill="#9C8E78"
          stroke="#7A5230" stroke-width="0.9"/>
    <rect x="130" y="70" width="30" height="28" fill="#5A5040" opacity="0.85"/>
    <line x1="145" y1="70" x2="145" y2="98" stroke="#3A2A1A" stroke-width="0.5"/>
    <line x1="130" y1="84" x2="160" y2="84" stroke="#3A2A1A" stroke-width="0.5"/>

    <!-- RIGHT window — closed shutters with grime -->
    <rect x="222" y="68" width="34" height="32" fill="#9C8E78"
          stroke="#7A5230" stroke-width="0.9"/>
    <rect x="224" y="70" width="30" height="28" fill="#5A5040" opacity="0.85"/>
    <line x1="239" y1="70" x2="239" y2="98" stroke="#3A2A1A" stroke-width="0.5"/>
    <line x1="224" y1="84" x2="254" y2="84" stroke="#3A2A1A" stroke-width="0.5"/>

    <!-- DOOR — closed, locked, with chain -->
    <rect x="174" y="68" width="38" height="66" fill="#6A4830"
          stroke="#3A2A1A" stroke-width="1"/>
    <rect x="176" y="70" width="34" height="62" fill="#7A5230"/>
    <line x1="193" y1="70" x2="193" y2="132" stroke="#3A2A1A" stroke-width="0.6"/>
    <!-- Door handles -->
    <circle cx="187" cy="100" r="1.5" fill="#1A1A1A"/>
    <circle cx="199" cy="100" r="1.5" fill="#1A1A1A"/>
    <!-- Chain across the door -->
    <rect x="180" y="98" width="26" height="5" fill="#3A2A1A"/>
    <!-- Padlock -->
    <rect x="190" y="96" width="6" height="3" fill="#7A5230"/>
    <rect x="191" y="92" width="4" height="6" fill="#A0816A"/>
  </g>

  <!-- Weeds at the base of the building (left and right sides) -->
  <g>
    <path d="M 120,132 q -1,-6 1,-9 q 2,3 1,9" fill="#5A7B4A" opacity="0.85"/>
    <path d="M 125,132 q -1,-5 0,-8 q 2,3 0,8" fill="#5A7B4A" opacity="0.85"/>
    <path d="M 130,132 q -1,-7 1,-10 q 2,5 0,10" fill="#4A6B3F"/>
    <path d="M 256,132 q -1,-6 1,-9 q 2,3 1,9" fill="#5A7B4A" opacity="0.85"/>
    <path d="M 261,132 q -1,-5 0,-8 q 2,3 0,8" fill="#4A6B3F"/>
  </g>

  <!-- Dust patches on walls (small spots suggesting neglect) -->
  <ellipse cx="135" cy="115" rx="6" ry="2" fill="#A89882" opacity="0.5"/>
  <ellipse cx="248" cy="118" rx="5" ry="2" fill="#A89882" opacity="0.5"/>

  <!-- Villager standing outside, arms crossed, looking up at building -->
  <g>
    <!-- Legs -->
    <rect x="58" y="100" width="6" height="34" fill="#3F5470" rx="1.5"/>
    <rect x="66" y="100" width="6" height="34" fill="#3F5470" rx="1.5"/>
    <!-- Torso -->
    <rect x="54" y="76" width="22" height="28" fill="#C2440A" rx="3"/>
    <!-- Head -->
    <circle cx="65" cy="68" r="9" fill="#E6B79E"/>
    <path d="M 56,65 Q 65,56 74,65 Q 72,60 65,59 Q 58,60 56,65 Z" fill="#3A2A1A"/>
    <!-- Eyes -->
    <circle cx="62" cy="68" r="0.7" fill="#3A2A1A"/>
    <circle cx="68" cy="68" r="0.7" fill="#3A2A1A"/>
    <!-- Subtle neutral mouth (not smiling — contemplating) -->
    <path d="M 62,73 q 3,1 6,0" stroke="#3A2A1A" stroke-width="0.7"
          fill="none" stroke-linecap="round"/>
    <!-- Arms crossed across chest — the "what could be done" body language -->
    <path d="M 54,82 Q 46,92 50,100" stroke="#E6B79E" stroke-width="5"
          fill="none" stroke-linecap="round"/>
    <path d="M 76,82 Q 84,92 80,100" stroke="#E6B79E" stroke-width="5"
          fill="none" stroke-linecap="round"/>
    <!-- The crossed arms band across the torso (suggests folded arms) -->
    <rect x="48" y="92" width="34" height="10" fill="#C2440A" rx="2"/>
    <!-- Feet -->
    <ellipse cx="61" cy="136" rx="3.5" ry="1.6" fill="#3A2A1A"/>
    <ellipse cx="69" cy="136" rx="3.5" ry="1.6" fill="#3A2A1A"/>
  </g>

  <!-- A wildflower or two in foreground for warm-palette consistency -->
  <g>
    <circle cx="36" cy="146" r="1.5" fill="#F5B940"/>
    <line x1="36" y1="147.5" x2="36" y2="152" stroke="#4A6B3F" stroke-width="0.6"/>
    <circle cx="98" cy="148" r="1.4" fill="#D9384E" opacity="0.85"/>
    <line x1="98" y1="149.5" x2="98" y2="153" stroke="#4A6B3F" stroke-width="0.5"/>
  </g>
</svg>
